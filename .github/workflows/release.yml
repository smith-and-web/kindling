name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  # sccache configuration for faster Rust builds
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

# Required for creating releases and committing changelog
permissions:
  contents: write

jobs:
  # Generate changelog and commit it back to the repo
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog
        run: npm run changelog

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          # Extract the changelog section for this version
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present

          # Extract content between this version header and the next version header (or --- separator)
          CHANGELOG=$(awk "/^## \[?${VERSION}\]?/{flag=1; next} /^## \[?[0-9]|^---/{flag=0} flag" CHANGELOG.md | head -100)

          # If no specific changelog found, use a default message
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See [CHANGELOG.md](https://github.com/smith-and-web/kindling/blob/main/CHANGELOG.md) for details."
          fi

          # Write to output (handle multiline)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check changelog changes
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to report"
          else
            echo "::warning::CHANGELOG.md updated during release build; commit manually to main."
            git --no-pager diff --stat CHANGELOG.md
          fi

  # Build and release for each platform
  release:
    name: Release
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # macOS Intel
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # Linux x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release
        timeout-minutes: 30
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple code signing (only effective on macOS runners)
          # APPLE_ID and APPLE_PASSWORD are intentionally omitted here so Tauri
          # signs without notarizing. Notarization is handled in a separate step
          # below with custom polling and its own timeout.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kindling ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            Download the appropriate installer for your platform:
            - **macOS (Apple Silicon)**: `Kindling_*_aarch64.dmg`
            - **macOS (Intel)**: `Kindling_*_x64.dmg`
            - **Windows**: `Kindling_*_x64-setup.msi`
            - **Linux**: `Kindling_*_amd64.AppImage` or `.deb`

            ### First-Time Installation Notes

            **macOS**: This app is code-signed and notarized by Apple.

            **Windows**: You may see a SmartScreen warning. Click "More info" then "Run anyway".

            **Linux**: Make the AppImage executable with `chmod +x` before running.

            ---

            ## What's Changed

            ${{ needs.changelog.outputs.changelog }}

            ---

            [Full Changelog](https://github.com/smith-and-web/kindling/blob/main/CHANGELOG.md)
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}

      # Notarize macOS builds separately from the Tauri action.
      # Apple's notarization service can take 30-60+ minutes for new apps.
      # By splitting this into its own step with custom polling, we avoid
      # blocking the entire build and get clear status updates.
      - name: Notarize macOS Build
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 120
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # Find the .app bundle produced by Tauri
          APP_PATH=$(find src-tauri/target -name "Kindling.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::warning::No .app bundle found — skipping notarization"
            exit 0
          fi
          echo "Found app bundle: $APP_PATH"

          # Create a zip for notarization submission
          ZIP_PATH="/tmp/Kindling-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Created submission zip: $(du -h "$ZIP_PATH" | cut -f1)"

          # Submit for notarization (without --wait)
          echo "Submitting for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | jq -r '.id')
          echo "Submission ID: $SUBMISSION_ID"
          echo "Polling for notarization status (this can take 30-60 minutes)..."

          # Poll every 30 seconds, up to 110 minutes
          MAX_ATTEMPTS=220
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30

            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>/dev/null || echo '{"status":"In Progress"}')

            STATUS=$(echo "$STATUS_OUTPUT" | jq -r '.status')
            ELAPSED=$((ATTEMPT * 30))
            echo "[${ELAPSED}s] Notarization status: $STATUS"

            case "$STATUS" in
              Accepted)
                echo "✅ Notarization accepted! Stapling ticket..."
                xcrun stapler staple "$APP_PATH"
                echo "Stapled ticket to .app"

                # Staple the DMG if it exists
                DMG_PATH=$(find src-tauri/target -name "*.dmg" | head -1)
                if [ -n "$DMG_PATH" ]; then
                  xcrun stapler staple "$DMG_PATH"
                  echo "Stapled ticket to DMG: $DMG_PATH"
                fi
                echo "✅ Notarization and stapling complete!"
                exit 0
                ;;
              Invalid|Rejected)
                echo "❌ Notarization failed: $STATUS"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
                exit 1
                ;;
            esac
          done
          echo "❌ Notarization polling timed out after $((MAX_ATTEMPTS * 30 / 60)) minutes"
          exit 1

  checksums:
    name: Generate Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" --dir artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec sha256sum {} \; | sort > ../checksums.sha256

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.sha256
          tag_name: ${{ github.ref_name }}
